<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>미스토리</title>
<meta property="og:type" content="website">
<meta property="og:title" content="미스토리 — 나의 오늘, 나의 이야기">
<meta property="og:description" content="사진과 짧은 글 한 줄. AI가 오늘을 기억할 글로 담아드립니다.">
<meta property="og:image" content="https://mestory.art/today-icon-512.png">
<meta property="og:url" content="https://mestory.art/today-result.html">
<meta name="theme-color" content="#27500A">
<link rel="icon" href="/today-icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2eb;font-family:'Noto Sans KR',sans-serif;color:#2d2a22}
.wrap{max-width:680px;margin:0 auto;background:#fff;min-height:100vh}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#0f0d09}
.dot{width:8px;height:8px;border-radius:50%;background:#c8a96e;display:inline-block;animation:pulse 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#error-box{display:none;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:40px;flex-direction:column;gap:16px}
.hero{background:#0f0d09;padding:64px 40px;text-align:center}
.hero-sub{font-size:11px;color:rgba(200,169,110,.6);letter-spacing:.25em;margin-bottom:16px}
.hero-name{font-family:Georgia,serif;font-size:36px;color:#f9f6f0;font-weight:300;margin-bottom:8px}
.hero-identity{font-size:15px;color:rgba(249,246,240,.5);font-style:italic;line-height:1.8;margin-top:8px}
.hero-date{font-size:12px;color:rgba(200,169,110,.55);letter-spacing:.04em;margin-top:10px}
.section{padding:48px 40px}
.section-label{font-size:11px;color:#9e8250;letter-spacing:.2em;margin-bottom:24px}
.rep-poem{padding:32px;background:#0f0d09;border-radius:4px;text-align:center}
.shot-card{margin-bottom:40px;background:#faf7f2;border-radius:4px;overflow:hidden}
.shot-img{width:100%;display:block;height:auto}
.shot-body{padding:24px 28px}
.shot-num{font-size:11px;color:#9e8250;letter-spacing:.15em;margin-bottom:6px}
.shot-text{font-size:14px;color:#6b6050;line-height:1.8;margin-bottom:20px;font-style:italic}
.shot-poem-wrap{border-top:1px solid #e5dece;padding-top:20px}
.shot-poem-inner{background:#FFF8ED;border-radius:4px;padding:16px 18px;font-size:13px}
.shot-poem-line{color:#5a4a30;line-height:1.8}
.last-msg{margin:40px 0;padding:24px 28px;border-left:3px solid #c8a96e;background:#faf7f2}
.last-msg-to{font-size:11px;color:#9e8250;letter-spacing:.1em;margin-bottom:10px}
.last-msg-text{font-size:18px;color:#2d2a22;font-style:italic;line-height:1.8}
.share-wrap{background:#faf7f2;padding:24px 40px;border-top:1px solid #e5dece;text-align:center}
.share-label{font-size:11px;color:#9e8250;letter-spacing:.1em;margin-bottom:8px}
.share-url{font-size:12px;color:#6b6050;margin-bottom:14px;word-break:break-all}
.share-btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.btn-kakao{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#FEE500;border:none;border-radius:20px;font-size:13px;color:#3C1E1E;cursor:pointer;font-family:inherit;font-weight:600}
.btn-copy{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#fff;border:1px solid #c8a96e;border-radius:20px;font-size:13px;color:#9e8250;cursor:pointer;font-family:inherit}
.share-tagline{font-size:12px;color:#c8a96e;line-height:1.8}
.cta-wrap{background:#27500A;padding:36px 40px;text-align:center}
.cta-sub{font-size:12px;color:rgba(234,243,222,.7);letter-spacing:.15em;margin-bottom:10px}
.cta-title{font-size:20px;color:#EAF3DE;font-weight:600;margin-bottom:6px;line-height:1.5}
.cta-desc{font-size:13px;color:rgba(234,243,222,.75);margin-bottom:20px;line-height:1.7}
.cta-btn{display:inline-block;padding:14px 36px;background:#EAF3DE;border-radius:4px;font-size:14px;font-weight:700;color:#27500A;text-decoration:none;letter-spacing:.06em}
.footer{padding:24px 40px;background:#f9f6f0;text-align:center;border-top:1px solid #e5dece}
.footer a{color:#9e8250;text-decoration:none;font-size:12px}
@media(max-width:600px){
  .section{padding:32px 20px}
  .hero{padding:48px 20px}
  .share-wrap,.cta-wrap{padding:24px 20px}
  .shot-body{padding:20px}
  .last-msg{margin:24px 0;padding:20px}
}
.lang-tabs{display:flex;gap:4px}
.lang-tab{padding:4px 10px;border:1px solid #c8a96e;background:transparent;border-radius:20px;font-size:11px;color:#9e8250;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:background .15s,color .15s}
.lang-tab.active{background:#c8a96e;color:#fff;border-color:#c8a96e}
.lang-tab-off{opacity:.35;cursor:not-allowed}
.play-btn{padding:10px 28px;background:#27500A;border:none;border-radius:20px;font-size:13px;color:#EAF3DE;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:opacity .15s}
.play-btn:disabled{opacity:.5;cursor:default}
#slideshow-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#slideshow-img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:4px}
#slideshow-dots{margin-top:14px;display:flex;gap:6px;align-items:center;min-height:10px}
#slideshow-stop-btn{margin-top:18px;padding:8px 28px;background:transparent;border:1px solid rgba(200,169,110,.5);border-radius:20px;color:rgba(200,169,110,.8);font-size:13px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="loading">
  <div style="display:flex;gap:6px">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <div style="font-size:12px;color:rgba(200,169,110,.5);letter-spacing:.1em;margin-top:4px">미스토리 · MESTORY</div>
</div>
<div id="error-box" style="display:none">
  <div style="font-size:18px;color:#6b6050">페이지를 찾을 수 없습니다.</div>
  <a href="https://mestory.art" style="font-size:13px;color:#27500A;text-decoration:none">← 미스토리로</a>
</div>
<div class="wrap" id="main" style="display:none"></div>

<div id="slideshow-overlay">
  <img id="slideshow-img" src="" alt="">
  <div id="slideshow-dots"></div>
  <button id="slideshow-stop-btn" onclick="window.stopSlideshow()">■ 정지</button>
</div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<script>
(function(){
  var SERVER = 'https://humandocu-server-production.up.railway.app';
  var params = new URLSearchParams(location.search);
  var docId = params.get('id');

  // ── TTS / 슬라이드쇼 상태 ──
  var _ttsLang = 'ko';
  var _audioCtx = null;
  var _audioSource = null;
  var _slideTimer = null;
  var _isPlaying = false;
  var _currentData = null;

  function _getPoem(data, lang) {
    var map = {
      ko: data.today_poem || '',
      en: data.today_poem_en || data.today_poem || '',
      ja: data.today_poem_ja || data.today_poem || '',
      zh: data.today_poem_zh || data.today_poem || '',
    };
    return map[lang] || data.today_poem || '';
  }

  function _getImages(data) {
    var imgs = [];
    (data.shots || []).forEach(function(s){ if(s.image) imgs.push(s.image); });
    return imgs;
  }

  function _updateDots(total, cur) {
    var el = document.getElementById('slideshow-dots');
    if(!el) return;
    var h = '';
    for(var i=0;i<total;i++){
      h += '<span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:'
        +(i===cur?'#c8a96e':'rgba(200,169,110,0.3)')+'"></span>';
    }
    el.innerHTML = h;
  }

  function _stopSlideshow() {
    _isPlaying = false;
    if(_slideTimer){ clearTimeout(_slideTimer); _slideTimer = null; }
    if(_audioSource){ try{ _audioSource.stop(); }catch(e){} _audioSource = null; }
    if(_audioCtx){ _audioCtx.close(); _audioCtx = null; }
    var ov = document.getElementById('slideshow-overlay');
    if(ov) ov.style.display = 'none';
    var btn = document.getElementById('play-btn');
    if(btn){ btn.textContent = '▶ 재생 + 낭독'; btn.disabled = false; }
  }
  window.stopSlideshow = _stopSlideshow;

  function _startSlideshow(audioB64, imgs) {
    _isPlaying = true;
    var btn = document.getElementById('play-btn');
    if(btn){ btn.textContent = '■ 정지'; btn.disabled = false; }

    var ov = document.getElementById('slideshow-overlay');
    var imgEl = document.getElementById('slideshow-img');
    if(ov && imgEl){ imgEl.src = imgs[0]; ov.style.display = 'flex'; }
    _updateDots(imgs.length, 0);

    var raw = atob(audioB64);
    var buf = new ArrayBuffer(raw.length);
    var view = new Uint8Array(buf);
    for(var i=0;i<raw.length;i++) view[i] = raw.charCodeAt(i);

    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    _audioCtx.decodeAudioData(buf, function(decoded){
      _audioSource = _audioCtx.createBufferSource();
      _audioSource.buffer = decoded;
      _audioSource.connect(_audioCtx.destination);

      var duration = decoded.duration;
      var interval = (duration / imgs.length) * 1000;
      var idx = 0;

      function advance(){
        idx++;
        if(idx < imgs.length){
          var el = document.getElementById('slideshow-img');
          if(el) el.src = imgs[idx];
          _updateDots(imgs.length, idx);
          _slideTimer = setTimeout(advance, interval);
        }
      }
      _slideTimer = setTimeout(advance, interval);

      _audioSource.onended = function(){ _stopSlideshow(); };
      _audioSource.start(0);
    }, function(){
      _stopSlideshow();
      alert('오디오 디코딩 오류가 발생했습니다.');
    });
  }

  window.selectLang = function(lang, el) {
    _ttsLang = lang;
    document.querySelectorAll('.lang-tab').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    var pd = document.getElementById('poem-display');
    if(pd && _currentData) pd.innerHTML = poemLinesHtml(_getPoem(_currentData, lang));
  };

  window.togglePlay = function() {
    if(_isPlaying){ _stopSlideshow(); return; }
    if(!_currentData) return;
    var text = _getPoem(_currentData, _ttsLang);
    if(!text){ alert('시 텍스트가 없습니다.'); return; }
    var imgs = _getImages(_currentData);
    if(!imgs.length){ alert('슬라이드쇼용 사진이 없습니다.'); return; }

    var btn = document.getElementById('play-btn');
    if(btn){ btn.textContent = '낭독 준비 중...'; btn.disabled = true; }

    fetch(SERVER + '/api/tts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text: text, lang: _ttsLang})
    })
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.audio) throw new Error(json.error || 'TTS 실패');
      _startSlideshow(json.audio, imgs);
    })
    .catch(function(e){
      if(btn){ btn.textContent = '▶ 재생 + 낭독'; btn.disabled = false; }
      alert('TTS 오류: ' + (e.message || '알 수 없는 오류'));
    });
  };

  if (!docId) { showError(); return; }

  var pageUrl = 'https://mestory.art/today-result.html?id=' + encodeURIComponent(docId);

  fetch(SERVER + '/api/today/data/' + encodeURIComponent(docId))
    .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data){ render(data); })
    .catch(function(){ showError(); });

  function showError(){
    document.getElementById('loading').style.display = 'none';
    var eb = document.getElementById('error-box');
    eb.style.display = 'flex';
  }

  function esc(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var GENRE_COLORS = {
    '감동명작':['#7B4F1E','#FFF3E0'],'히어로 액션':['#7A0000','#FFEAEA'],
    '잔잔한 다큐':['#1A2A5E','#EAF0FF'],'멜로 로맨스':['#7A1040','#FFF0F5'],
    '병맛 코미디':['#7A3A00','#FFF5E8'],'반전 스릴러':['#3A0060','#F5EAFF'],
    'touching':['#7B4F1E','#FFF3E0'],'hero action':['#7A0000','#FFEAEA'],
    'quiet doc':['#1A2A5E','#EAF0FF'],'melo romance':['#7A1040','#FFF0F5'],
    'weird comedy':['#7A3A00','#FFF5E8'],'twist thriller':['#3A0060','#F5EAFF'],
  };
  function genreBadge(tone){
    if(!tone) return '';
    var c = GENRE_COLORS[tone] || GENRE_COLORS[tone.toLowerCase()] || ['#7B4F1E','#FFF3E0'];
    return '<span style="display:inline-block;padding:3px 10px;border-radius:20px;background:'+c[1]+';color:'+c[0]+';font-size:11px;letter-spacing:.08em;font-weight:600">'+esc(tone)+'</span>';
  }

  function poemLinesHtml(text, fs, color){
    fs = fs||'17px'; color = color||'#f9f6f0';
    return text.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){
      return '<div style="line-height:2;font-size:'+fs+';color:'+color+';font-family:Georgia,serif;letter-spacing:.02em">'+esc(l)+'</div>';
    }).join('');
  }

  function render(data){
    _currentData = data;
    document.title = '미스토리 · ' + esc(data.nickname||'');

    var hasImgs = (data.shots||[]).some(function(s){return !!s.image;});
    var firstImg = '';
    if(data.shots){
      for(var i=0;i<data.shots.length;i++){
        if(data.shots[i].image){ firstImg=data.shots[i].image; break; }
      }
    }
    var shareDesc = data.identity || '';
    if(!shareDesc && data.today_poem){
      var pl = data.today_poem.split('\n').filter(function(l){return l.trim();});
      if(pl.length) shareDesc = pl[0];
    }
    if(!shareDesc && data.shots && data.shots.length) shareDesc = data.shots[0].text || '';
    if(!shareDesc) shareDesc = '사진과 짧은 글 한 줄. AI가 오늘을 기억할 글로 담아드립니다.';

    window._share = { img: firstImg||'https://mestory.art/today-icon-512.png', desc: shareDesc, url: pageUrl };

    // Hero
    var html = '<div class="hero">'
      +'<div class="hero-sub">미스토리 · MESTORY</div>'
      +'<div class="hero-name">'+esc(data.nickname)+'</div>'
      +(data.identity?'<div class="hero-identity">'+esc(data.identity)+'</div>':'')
      +(data.created_at?'<div class="hero-date">'+esc(data.created_at)+'</div>':'')
      +'</div>';

    // Today poem
    if(data.today_poem){
      var langTabsHtml = '<div class="lang-tabs">'
        +'<button class="lang-tab active" onclick="selectLang(\'ko\',this)">KO</button>'
        +'<button class="lang-tab'+(data.today_poem_en?'':' lang-tab-off')+'" onclick="if(this.classList.contains(\'lang-tab-off\'))return;selectLang(\'en\',this)">EN</button>'
        +'<button class="lang-tab'+(data.today_poem_ja?'':' lang-tab-off')+'" onclick="if(this.classList.contains(\'lang-tab-off\'))return;selectLang(\'ja\',this)">JP</button>'
        +'<button class="lang-tab'+(data.today_poem_zh?'':' lang-tab-off')+'" onclick="if(this.classList.contains(\'lang-tab-off\'))return;selectLang(\'zh\',this)">ZH</button>'
        +'</div>';
      html += '<div class="section">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
        +'<div class="section-label" style="margin-bottom:0">✦ 오늘을 담은 시</div>'
        +langTabsHtml
        +'</div>'
        +(data.genre?'<div style="text-align:center;margin-bottom:14px">'+genreBadge(data.genre)+'</div>':'')
        +'<div class="rep-poem" id="poem-display">'+poemLinesHtml(data.today_poem)+'</div>'
        +'</div>';
    }

    // Shot cards
    var shotsHtml = '';
    if(data.shots){
      data.shots.forEach(function(s){
        var imgBlock = s.image
          ?'<div style="overflow:hidden"><img src="'+esc(s.image)+'" alt="SHOT '+s.index+'" class="shot-img" loading="lazy"></div>'
          :'';
        var poemBlock = '';
        if(s.poem){
          var pLines = s.poem.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){return esc(l);}).join('<br>');
          poemBlock = '<div class="shot-poem-wrap"><div class="shot-poem-inner">'
            +(s.tone?'<div style="margin-bottom:8px">'+genreBadge(s.tone)+'</div>':'')
            +'<div class="shot-poem-line">'+pLines+'</div>'
            +'</div></div>';
        }
        shotsHtml += '<div class="shot-card">'+imgBlock
          +'<div class="shot-body">'
          +'<div class="shot-num">SHOT '+String(s.index).padStart(2,'0')+'</div>'
          +(s.text?'<div class="shot-text">'+esc(s.text)+'</div>':'')
          +poemBlock
          +'</div></div>';
      });
    }

    html += '<div class="section" style="padding-top:0">'
      +'<div class="section-label">오늘의 사진들</div>'
      +shotsHtml+'</div>';

    // Last message
    if(data.last_msg){
      var toLabel = data.last_to ? 'To. '+data.last_to : '누군가에게 남기는 한 줄';
      html += '<div class="last-msg">'
        +'<div class="last-msg-to">'+esc(toLabel)+'</div>'
        +'<div class="last-msg-text">'+esc(data.last_msg)+'</div>'
        +'</div>';
    }

    // Share
    html += '<div class="share-wrap">'
      +'<div class="share-label">나의 미스토리 링크</div>'
      +'<div class="share-url">'+pageUrl+'</div>'
      +'<div class="share-btns">'
      +'<button class="btn-kakao" onclick="doKakao()">'
      +'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="8" rx="8" ry="6.5" fill="#3C1E1E"/><path d="M5.5 10.5c.3.7 1 1.2 2 1.5l-.5 2 2-1.5c.3 0 .7.1 1 .1 3.3 0 6-2 6-4.5S12.3 3.5 9 3.5 3 5.5 3 8c0 1 .6 2 1.5 2.5z" fill="#FEE500"/></svg>'
      +'KakaoTalk</button>'
      +'<button class="btn-copy" onclick="doCopy()">🔗 링크 복사</button>'
      +(hasImgs && data.today_poem?'<button id="play-btn" class="play-btn" onclick="togglePlay()">▶ 재생 + 낭독</button>':'')
      +'</div>'
      +'<div class="share-tagline">매일을 담아보세요.<br>모으면 그것이 당신이에요.</div>'
      +'</div>';

    // CTA
    html += '<div class="cta-wrap">'
      +'<div class="cta-sub">MESTORY</div>'
      +'<div class="cta-title">오늘 당신의 하루도<br>이야기가 될 수 있어요</div>'
      +'<div class="cta-desc">사진과 짧은 글 한 줄 · 무료 · AI가 기억할 글로 담아드립니다</div>'
      +'<a href="https://mestory.art" class="cta-btn">나도 기록하기 →</a>'
      +'</div>';

    // Footer
    html += '<div class="footer"><a href="https://mestory.art">mestory.art</a></div>';

    document.getElementById('main').innerHTML = html;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    if(window.Kakao && !Kakao.isInitialized()){
      Kakao.init('5b7821698a09c74f1d72c0b52165d557');
    }
  }

  window.doKakao = function(){
    if(!window.Kakao||!Kakao.isInitialized()){ doCopy(); return; }
    var s = window._share||{};
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{
        title:'미스토리 — 나의 오늘, 나의 이야기',
        description: s.desc||'',
        imageUrl: s.img||'https://mestory.art/today-icon-512.png',
        link:{ mobileWebUrl: s.url, webUrl: s.url },
      },
      buttons:[
        {title:'이 기록 보기', link:{ mobileWebUrl: s.url, webUrl: s.url }},
        {title:'나도 기록하기', link:{ mobileWebUrl:'https://mestory.art', webUrl:'https://mestory.art' }},
      ],
    });
  };

  window.doCopy = function(){
    var url = pageUrl;
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){ alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요'); });
    } else {
      var el=document.createElement('textarea'); el.value=url;
      document.body.appendChild(el); el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요');
    }
  };
})();
