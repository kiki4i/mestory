<!DOCTYPE html>
<html lang="ko">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>미스토리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2eb;font-family:'Noto Sans KR',sans-serif;color:#2d2a22}
#lang-bar{position:fixed;top:12px;right:14px;z-index:200;display:flex;gap:3px}
.ltab{font-size:10px;padding:4px 8px;border-radius:20px;border:1px solid #ccc;background:#f5f2eb;color:#888;cursor:pointer;letter-spacing:.05em}
.ltab.active{background:#27500A;color:#fff;border-color:#27500A}
/* Hero */
.hero{position:relative;width:100%;overflow:hidden}
.hero-img{width:100%;display:block;height:auto;max-height:65vw;object-fit:cover}
.hero-info{background:#1a1a12;padding:20px 22px 22px}
.hero-brand{font-size:10px;color:rgba(200,169,110,.65);letter-spacing:.25em;margin-bottom:8px}
.hero-name{font-family:Georgia,serif;font-size:26px;color:#f9f6f0;font-weight:300;line-height:1.2;margin-bottom:6px}
.hero-identity{font-size:13px;color:rgba(249,246,240,.5);font-style:italic;line-height:1.6;margin-bottom:5px}
.hero-date{font-size:11px;color:rgba(200,169,110,.5);letter-spacing:.04em}
/* Shot */
.shot-sec{border-top:1px solid #f0ece3}
.shot-img{width:100%;display:block;height:auto}
.shot-body{padding:18px 22px 26px;background:#f5f2eb}
.shot-num{font-size:10px;color:#9e8250;letter-spacing:.18em;margin-bottom:8px;font-weight:500}
.shot-caption{font-size:14px;color:#6b6050;line-height:1.8;margin-bottom:14px;font-style:italic}
.shot-poem{border-left:3px solid #27500A;padding:8px 12px;font-size:13px;color:#2d2a22;line-height:1.9;font-style:italic}
/* Poem */
.poem-sec{background:#fff;padding:36px 22px 32px;border-top:1px solid #f0ece3}
.sec-label{font-size:10px;color:#9e8250;letter-spacing:.18em;margin-bottom:12px;font-weight:500}
.genre-badge{display:inline-block;font-size:11px;background:#27500A;color:#d4ebb0;padding:3px 12px;border-radius:20px;margin-bottom:18px}
.poem-body{padding:0 2px}
.poem-line{font-family:Georgia,serif;font-size:18px;color:#2d2a22;line-height:2.3;letter-spacing:.01em}
/* Last msg */
.last-msg-sec{padding:28px 22px;background:#f5f2eb;border-top:1px solid #f0ece3}
.last-msg-to{font-size:11px;color:#9e8250;letter-spacing:.12em;margin-bottom:8px}
.last-msg-text{font-size:15px;color:#2d2a22;line-height:1.8;font-style:italic}
/* Share */
.share-sec{padding:28px 22px;background:#f5f2eb;border-top:1px solid #f0ece3;text-align:center}
.share-lbl{font-size:11px;color:#9e8250;letter-spacing:.12em;margin-bottom:6px}
.share-url{font-size:11px;color:#aaa;margin-bottom:16px;word-break:break-all}
.share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.btn-kakao{display:flex;align-items:center;gap:6px;background:#FEE500;color:#3C1E1E;font-size:13px;padding:9px 18px;border-radius:24px;border:none;cursor:pointer;font-weight:500}
.btn-copy{background:transparent;color:#555;font-size:13px;padding:9px 16px;border-radius:24px;border:1px solid #ccc;cursor:pointer}
.play-btn{background:#27500A;color:#fff;font-size:13px;padding:9px 18px;border-radius:24px;border:none;cursor:pointer;width:100%;margin-top:4px}
.share-tagline{font-size:12px;color:#aaa;margin-top:14px;line-height:1.7}
/* Delete */
.delete-wrap{text-align:center;padding:6px 0 16px}
.delete-btn{font-size:12px;color:#e53e3e;text-decoration:underline;background:none;border:none;cursor:pointer;font-weight:500}
/* CTA */
.cta-sec{background:#27500A;padding:36px 22px;text-align:center}
.cta-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.2em;margin-bottom:10px}
.cta-title{font-size:20px;font-weight:500;color:#fff;line-height:1.5;margin-bottom:8px}
.cta-desc{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:20px;line-height:1.7}
.cta-btn{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:13px;padding:10px 24px;border-radius:24px;border:1px solid rgba(255,255,255,.3);text-decoration:none}
.footer{text-align:center;padding:16px;font-size:11px;color:#aaa}
.footer a{color:#aaa;text-decoration:none}
/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.dot{width:6px;height:6px;border-radius:50%;background:#27500A;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
#error-box{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px}
/* Slideshow */
#slideshow-overlay{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column}
#slideshow-overlay.active{display:flex}
#ss-stage{flex:1;position:relative;overflow:hidden}
.ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transition:opacity .8s}
#ss-img-a{z-index:2}#ss-img-b{z-index:1}
#ss-caption{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 20px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:13px;line-height:1.6;display:none;z-index:3}
#ss-text-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);color:#f9f6f0;text-align:center;padding:32px;z-index:4;opacity:0;transition:opacity .6s;pointer-events:none}
#ss-footer{padding:10px 20px 20px;display:flex;align-items:center;justify-content:space-between;background:#000}
#slideshow-dots{display:flex;gap:6px}
.ss-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3)}
.ss-dot.active{background:#fff}
#slideshow-stop-btn{color:#fff;background:none;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer}
/* Delete modal */
#del-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
#del-modal.active{display:flex}
.del-box{background:#fff;border-radius:16px;padding:28px 24px;width:90%;max-width:340px}
.del-title{font-size:16px;font-weight:500;margin-bottom:6px;color:#2d2a22}
.del-sub{font-size:12px;color:#888;margin-bottom:16px;line-height:1.6}
.del-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:10px}
.del-btn-row{display:flex;gap:8px}
.del-confirm{flex:1;background:#e53e3e;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer}
.del-cancel{flex:1;background:#f5f2eb;color:#555;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:13px;cursor:pointer}
.del-msg{font-size:12px;color:#e53e3e;margin-top:8px;min-height:18px}
@media(max-width:480px){.hero-name{font-size:22px}.poem-line{font-size:16px}}
</style>

<div id="lang-bar">
  <button class="ltab active" onclick="selectLang('ko',this)">KO</button>
  <button class="ltab" onclick="selectLang('en',this)">EN</button>
  <button class="ltab" onclick="selectLang('ja',this)">JP</button>
  <button class="ltab" onclick="selectLang('zh',this)">ZH</button>
</div>

<div id="slideshow-overlay">
  <div id="ss-stage">
    <img id="ss-img-a" class="ss-img" alt="">
    <img id="ss-img-b" class="ss-img" alt="" style="opacity:0">
    <div id="ss-caption"></div>
    <div id="ss-text-screen"></div>
  </div>
  <div id="ss-footer">
    <div id="slideshow-dots"></div>
    <button id="slideshow-stop-btn" onclick="window.stopSlideshow()">&#9646; 정지</button>
  </div>
</div>

<div id="del-modal">
  <div class="del-box">
    <div class="del-title" id="del-title">이 기록 삭제</div>
    <div class="del-sub" id="del-sub">등록하신 이메일 주소를 입력하면 인증 코드를 보내드려요.</div>
    <input class="del-input" id="del-email" type="email" placeholder="이메일 주소" style="display:block">
    <input class="del-input" id="del-code" type="text" placeholder="인증 코드 6자리" style="display:none" maxlength="6">
    <div class="del-msg" id="del-msg"></div>
    <div class="del-btn-row">
      <button class="del-confirm" id="del-confirm-btn" onclick="delConfirmAction()">인증 코드 받기</button>
      <button class="del-cancel" onclick="closeDel()">취소</button>
    </div>
  </div>
</div>

<div id="loading">
  <div style="display:flex;gap:6px">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <div style="font-size:11px;color:rgba(200,169,110,.5);letter-spacing:.12em;margin-top:4px">미스토리 · MESTORY</div>
</div>
<div id="error-box">
  <div style="font-size:17px;color:#6b6050">페이지를 찾을 수 없습니다.</div>
  <a href="https://mestory.art" style="font-size:13px;color:#27500A;text-decoration:none">← 미스토리로</a>
</div>
<div id="main" style="display:none"></div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<script>
(function(){
  var SERVER = 'https://humandocu-server-production.up.railway.app';
  var params = new URLSearchParams(location.search);
  var docId  = params.get('id');
  var pageUrl= 'https://mestory.art/today-result.html?id=' + (docId ? encodeURIComponent(docId) : '');
  var _ttsLang = 'ko';
  var _slideTimer = null;
  var _isPlaying  = false;
  var _captionTimer = null;
  var _currentData  = null;
  var _bgmAudio     = null;
  var BGM_URL = 'https://kiki4i.github.io/humandocu/bugo/BGM.mp3';
  var _delStep = 'email';

  // ── 언어 탭 ──
  window.selectLang = function(lang, btn){
    _ttsLang = lang;
    document.querySelectorAll('.ltab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    if (!_currentData) return;
    var poemEl = document.getElementById('poem-display');
    if (!poemEl) return;
    if (lang === 'ko') {
      poemEl.innerHTML = poemBodyHtml(_currentData.today_poem);
      return;
    }
    var cached = _getPoem(_currentData, lang);
    if (cached) {
      poemEl.innerHTML = poemBodyHtml(cached);
      return;
    }
    poemEl.innerHTML = '<div style="font-size:12px;color:#aaa;padding:8px 0">번역 중...</div>';
    fetch(SERVER + '/api/translate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text: _currentData.today_poem, target_lang: lang})
    }).then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(j){
        if(j.translated){
          if(lang==='en') _currentData.today_poem_en = j.translated;
          if(lang==='ja') _currentData.today_poem_ja = j.translated;
          if(lang==='zh') _currentData.today_poem_zh = j.translated;
          poemEl.innerHTML = poemBodyHtml(j.translated);
        }
      })
      .catch(function(){ poemEl.innerHTML = poemBodyHtml(_currentData.today_poem); });
  };

  function _getPoem(data, lang){
    var map = {
      ko: data.today_poem || '',
      en: data.today_poem_en || '',
      ja: data.today_poem_ja || '',
      zh: data.today_poem_zh || '',
    };
    return map[lang] || data.today_poem || '';
  }

  function _getImages(data){
    var imgs = [];
    (data.shots||[]).forEach(function(s){ if(s.image) imgs.push(s.image); });
    return imgs;
  }

  function _updateDots(total, cur){
    var el = document.getElementById('slideshow-dots');
    if (!el) return;
    el.innerHTML = '';
    for(var i=0;i<total;i++){
      var d = document.createElement('div');
      d.className = 'ss-dot' + (i===cur?' active':'');
      el.appendChild(d);
    }
  }

  function _stopSlideshow(){
    _isPlaying = false;
    if(_slideTimer){ clearTimeout(_slideTimer); _slideTimer=null; }
    if(_captionTimer){ clearTimeout(_captionTimer); _captionTimer=null; }
    if(_bgmAudio){ try{_bgmAudio.pause();}catch(e){} _bgmAudio=null; }
    var ov = document.getElementById('slideshow-overlay');
    if(ov) ov.classList.remove('active');
    var pb = document.getElementById('play-btn');
    if(pb){ pb.textContent='▶ 슬라이드쇼 재생'; }
  }
  window.stopSlideshow = _stopSlideshow;

  function _ssCrossfadeTo(url, captionText){
    var a = document.getElementById('ss-img-a');
    var b = document.getElementById('ss-img-b');
    var cap = document.getElementById('ss-caption');
    var ts  = document.getElementById('ss-text-screen');
    if(ts){ ts.style.opacity='0'; setTimeout(function(){ ts.style.display='none'; }, 820); }
    if(cap){ cap.style.display='none'; }
    var preload = new Image();
    preload.onload = preload.onerror = function(){
      b.src = url; b.style.opacity='1';
      a.style.opacity='0';
      setTimeout(function(){
        a.src = url; a.style.opacity='1'; b.style.opacity='0';
        if(captionText && cap){
          _captionTimer = setTimeout(function(){
            cap.textContent = captionText; cap.style.display='block';
          }, 500);
        }
      }, 820);
    };
    preload.src = url;
  }

  function _ssShowText(innerHtml){
    var ts = document.getElementById('ss-text-screen');
    var cap = document.getElementById('ss-caption');
    if(cap) cap.style.display='none';
    if(!ts) return;
    ts.innerHTML = innerHtml;
    ts.style.display='flex';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ ts.style.opacity='1'; });
    });
  }

  function _startSlideshow(imgs){
    var ov = document.getElementById('slideshow-overlay');
    if(ov) ov.classList.add('active');
    _isPlaying = true;
    var pb = document.getElementById('play-btn');
    if(pb) pb.textContent='■ 정지';
    if(_bgmAudio){ try{_bgmAudio.pause();}catch(e){} }
    _bgmAudio = new Audio(BGM_URL);
    _bgmAudio.loop=true; _bgmAudio.volume=0.25;
    _bgmAudio.play().catch(function(){});
    var nick = (_currentData && _currentData.nickname) || '';
    var dateStr = (_currentData && _currentData.created_at) || '';
    var genre = (_currentData && _currentData.genre) || '';
    function _introHtml(){
      return '<div style="font-size:11px;color:rgba(200,169,110,.6);letter-spacing:.2em;margin-bottom:16px">미스토리 · MESTORY</div>'
        +(nick?'<div style="font-family:Georgia,serif;font-size:24px;color:#f9f6f0;margin-bottom:10px">'+esc(nick)+'</div>':'')
        +(dateStr?'<div style="font-size:12px;color:rgba(249,246,240,.5)">'+esc(dateStr)+'</div>':'')
        +(genre?'<div style="font-size:11px;color:rgba(200,169,110,.6);margin-top:8px">'+esc(genre)+'</div>':'');
    }
    var captions = imgs.map(function(url){
      var shots = (_currentData && _currentData.shots)||[];
      for(var j=0;j<shots.length;j++){
        if(shots[j].image===url) return shots[j].text||'';
      }
      return '';
    });
    _ssShowText(_introHtml());
    _slideTimer = setTimeout(function(){
      function showPhoto(idx){
        if(!_isPlaying) return;
        _ssCrossfadeTo(imgs[idx], captions[idx]);
        _updateDots(imgs.length, idx);
        if(idx < imgs.length-1){
          _slideTimer = setTimeout(function(){ showPhoto(idx+1); }, 4000);
        } else {
          _slideTimer = setTimeout(function(){
            if(!_isPlaying) return;
            var pLines = _getPoem(_currentData, _ttsLang).trim().split('\n').filter(function(l){ return l.trim(); });
            var pHtml = pLines.map(function(l){ return '<div style="font-family:Georgia,serif;font-size:16px;color:#f9f6f0;line-height:2.2;letter-spacing:.01em">'+esc(l)+'</div>'; }).join('');
            _ssShowText('<div style="font-size:10px;color:rgba(200,169,110,.6);letter-spacing:.18em;margin-bottom:20px">✦ 오늘을 담은 시</div>'+pHtml);
            _slideTimer = setTimeout(function(){
              if(!_isPlaying) return;
              _ssShowText(_introHtml());
              _slideTimer = setTimeout(function(){ showPhoto(0); }, 1500);
            }, 5000);
          }, 4000);
        }
      }
      showPhoto(0);
    }, 1500);
  }

  window.togglePlay = function(){
    if(_isPlaying){ _stopSlideshow(); return; }
    if(!_currentData) return;
    var imgs = _getImages(_currentData);
    if(!imgs.length){ alert('슬라이드쇼용 사진이 없습니다.'); return; }
    _startSlideshow(imgs);
  };

  // ── 삭제 기능 ──
  window.openDel = function(){
    _delStep = 'email';
    document.getElementById('del-title').textContent = '이 기록 삭제';
    document.getElementById('del-sub').textContent = '등록하신 이메일 주소를 입력하면 인증 코드를 보내드려요.';
    document.getElementById('del-email').style.display = 'block';
    document.getElementById('del-email').value = localStorage.getItem('mestory_email')||'';
    document.getElementById('del-code').style.display = 'none';
    document.getElementById('del-code').value = '';
    document.getElementById('del-msg').textContent = '';
    document.getElementById('del-confirm-btn').textContent = '인증 코드 받기';
    document.getElementById('del-modal').classList.add('active');
  };
  window.closeDel = function(){
    document.getElementById('del-modal').classList.remove('active');
  };
  window.delConfirmAction = function(){
    if(_delStep==='email'){
      var email = document.getElementById('del-email').value.trim();
      if(!email){ document.getElementById('del-msg').textContent='이메일을 입력해주세요.'; return; }
      document.getElementById('del-confirm-btn').textContent='전송 중...';
      fetch(SERVER+'/api/today/delete-request',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({doc_id: docId, email: email})
      }).then(function(r){ return r.json(); })
        .then(function(j){
          if(j.ok){
            localStorage.setItem('mestory_email', email);
            _delStep='code';
            document.getElementById('del-sub').textContent='이메일로 인증 코드를 보냈어요. 코드를 입력하거나 이메일의 "바로 삭제하기" 버튼을 클릭하세요.';
            document.getElementById('del-email').style.display='none';
            document.getElementById('del-code').style.display='block';
            document.getElementById('del-confirm-btn').textContent='삭제 확인';
            document.getElementById('del-msg').textContent='';
          } else {
            document.getElementById('del-msg').textContent = j.message||'오류가 발생했어요.';
            document.getElementById('del-confirm-btn').textContent='인증 코드 받기';
          }
        }).catch(function(){ document.getElementById('del-msg').textContent='오류가 발생했어요.'; document.getElementById('del-confirm-btn').textContent='인증 코드 받기'; });
    } else {
      var code = document.getElementById('del-code').value.trim();
      if(!code){ document.getElementById('del-msg').textContent='코드를 입력해주세요.'; return; }
      document.getElementById('del-confirm-btn').textContent='삭제 중...';
      fetch(SERVER+'/api/today/delete-confirm',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({doc_id: docId, code: code})
      }).then(function(r){ return r.json(); })
        .then(function(j){
          if(j.ok){ window.location.href='https://mestory.art'; }
          else { document.getElementById('del-msg').textContent=j.message||'코드가 올바르지 않아요.'; document.getElementById('del-confirm-btn').textContent='삭제 확인'; }
        }).catch(function(){ document.getElementById('del-msg').textContent='오류가 발생했어요.'; document.getElementById('del-confirm-btn').textContent='삭제 확인'; });
    }
  };

  // ── Init ──
  if(!docId){ showError(); return; }
  fetch(SERVER+'/api/today/data/'+encodeURIComponent(docId))
    .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data){ render(data); })
    .catch(function(){ showError(); });

  function showError(){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-box').style.display='flex';
  }

  function esc(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function poemBodyHtml(text){
    if(!text) return '';
    return text.trim().split('\n').filter(function(l){ return l.trim(); }).map(function(l){
      return '<div class="poem-line">'+esc(l)+'</div>';
    }).join('');
  }

  function render(data){
    _currentData = data;
    document.title = '미스토리 · '+(data.nickname||'');
    var shots = data.shots||[];
    var hasImgs = shots.some(function(s){ return !!s.image; });
    var firstImg = '';
    for(var i=0;i<shots.length;i++){ if(shots[i].image){ firstImg=shots[i].image; break; } }
    var shareDesc = data.identity||'';
    if(!shareDesc && data.today_poem){ var pl=data.today_poem.split('\n').filter(function(l){return l.trim();}); if(pl.length) shareDesc=pl[0]; }
    if(!shareDesc && shots.length) shareDesc=shots[0].text||'';
    if(!shareDesc) shareDesc='사진과 짧은 글 한 줄. AI가 오늘을 기억할 글로 담아드립니다.';
    window._share={ img:firstImg||'https://mestory.art/today-icon-512.png', desc:shareDesc, url:pageUrl };

    var html='';

    // 1. Hero (첫 사진 + 타이틀)
    if(firstImg){
      html+='<div class="hero"><img src="'+esc(firstImg)+'" class="hero-img" alt="오늘의 사진"></div>';
    }
    html+='<div class="hero-info">'
      +'<div class="hero-brand">미스토리 · MESTORY</div>'
      +'<div class="hero-name">'+esc(data.nickname||'')+'</div>'
      +(data.identity?'<div class="hero-identity">'+esc(data.identity)+'</div>':'')
      +(data.created_at?'<div class="hero-date">'+esc(data.created_at)+'</div>':'')
      +'</div>';

    // 2. 모든 shots (사진 → 캡션 → 시구 순서)
    shots.forEach(function(s){
      html+='<div class="shot-sec">';
      if(s.image) html+='<img src="'+esc(s.image)+'" class="shot-img" loading="lazy" alt="SHOT '+s.index+'">';
      html+='<div class="shot-body">';
      html+='<div class="shot-num">SHOT '+String(s.index).padStart(2,'0')+'</div>';
      if(s.text) html+='<div class="shot-caption">'+esc(s.text)+'</div>';
      if(s.poem){
        var pLines=s.poem.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){return esc(l);}).join('<br>');
        html+='<div class="shot-poem">'+pLines+'</div>';
      }
      html+='</div></div>';
    });

    // 3. 오늘을 담은 시 (마지막)
    if(data.today_poem){
      html+='<div class="poem-sec">'
        +'<div class="sec-label">✦ 오늘을 담은 시</div>'
        +(data.genre?'<div class="genre-badge">'+esc(data.genre)+'</div>':'')
        +'<div class="poem-body" id="poem-display">'+poemBodyHtml(data.today_poem)+'</div>'
        +'</div>';
    }

    // 4. Last msg
    if(data.last_msg){
      var toLabel=data.last_to?'To. '+data.last_to:'누군가에게 남기는 한 줄';
      html+='<div class="last-msg-sec">'
        +'<div class="last-msg-to">'+esc(toLabel)+'</div>'
        +'<div class="last-msg-text">'+esc(data.last_msg)+'</div>'
        +'</div>';
    }

    // 5. Share
    html+='<div class="share-sec">'
      +'<div class="share-lbl">나의 미스토리 링크</div>'
      +'<div class="share-url">'+pageUrl+'</div>'
      +'<div class="share-btns">'
      +'<button class="btn-kakao" onclick="doKakao()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="8" rx="8" ry="6.5" fill="#3C1E1E"/><path d="M5.5 10.5c.3.7 1 1.2 2 1.5l-.5 2 2-1.5c.3 0 .7.1 1 .1 3.3 0 6-2 6-4.5S12.3 3.5 9 3.5 3 5.5 3 8c0 1 .6 2 1.5 2.5z" fill="#FEE500"/></svg>KakaoTalk</button>'
      +'<button class="btn-copy" onclick="doCopy()">&#128279; 링크 복사</button>'
      +'</div>'
      +(hasImgs && data.today_poem?'<button id="play-btn" class="play-btn" onclick="togglePlay()">&#9654; 슬라이드쇼 재생</button>':'')
      +'<div class="share-tagline">매일을 담아보세요.<br>모으면 그것이 당신이에요.</div>'
      +'</div>';

    // 6. 삭제
    html+='<div class="delete-wrap"><button class="delete-btn" onclick="openDel()">이 기록 삭제</button></div>';

    // 7. CTA
    html+='<div class="cta-sec">'
      +'<div class="cta-sub">MESTORY</div>'
      +'<div class="cta-title">오늘 당신의 하루도<br>이야기가 될 수 있어요</div>'
      +'<div class="cta-desc">사진과 짧은 글 한 줄 · 무료 · AI가 기억할 글로 담아드립니다</div>'
      +'<a href="https://mestory.art" class="cta-btn">나도 기록하기 →</a>'
      +'</div>';

    html+='<div class="footer"><a href="https://mestory.art">mestory.art</a></div>';

    document.getElementById('main').innerHTML=html;
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    if(window.Kakao && !Kakao.isInitialized()) Kakao.init('5b7821698a09c74f1d72c0b52165d557');
  }

  window.doKakao=function(){
    if(!window.Kakao||!Kakao.isInitialized()){ doCopy(); return; }
    var s=window._share||{};
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{
        title:'미스토리 — 나의 오늘, 나의 이야기',
        description:s.desc||'',
        imageUrl:s.img||'https://mestory.art/today-icon-512.png',
        link:{mobileWebUrl:s.url,webUrl:s.url},
      },
      buttons:[
        {title:'이 기록 보기',link:{mobileWebUrl:s.url,webUrl:s.url}},
        {title:'나도 기록하기',link:{mobileWebUrl:'https://mestory.art',webUrl:'https://mestory.art'}},
      ],
    });
  };
  window.doCopy=function(){
    var url=pageUrl;
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){ alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요'); });
    } else {
      var el=document.createElement('textarea'); el.value=url;
      document.body.appendChild(el); el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요');
    }
  };
})();
</script>
</body>
</html>
