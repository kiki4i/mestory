<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>미스토리</title>
<meta property="og:type" content="website">
<meta property="og:title" content="미스토리 — 나의 오늘, 나의 이야기">
<meta property="og:description" content="사진과 짧은 글 한 줄. AI가 오늘을 기억할 글로 담아드립니다.">
<meta property="og:image" content="https://mestory.art/today-icon-512.png">
<meta property="og:url" content="https://mestory.art/today-result-v2.html">
<meta name="theme-color" content="#27500A">
<link rel="icon" href="/today-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2eb;font-family:'Noto Sans KR',sans-serif;color:#2d2a22}
#main{max-width:680px;margin:0 auto;background:#fff;min-height:100vh}

/* ── Loading ── */
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:#0f0d09}
.dot{width:8px;height:8px;border-radius:50%;background:#c8a96e;display:inline-block;animation:pulse 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#error-box{display:none;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:40px;flex-direction:column;gap:16px}

/* ── Language tabs (fixed top-right) ── */
#lang-bar{position:fixed;top:12px;right:14px;z-index:200;display:flex;gap:3px}
.ltab{padding:4px 9px;background:rgba(255,255,255,.88);border:1px solid rgba(39,80,10,.2);border-radius:20px;font-size:10px;color:#27500A;cursor:pointer;font-family:inherit;letter-spacing:.06em;transition:all .15s;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.ltab.active{background:#27500A;color:#fff;border-color:#27500A}

/* ── Hero ── */
.hero{position:relative;width:100%;height:55vw;min-height:260px;max-height:460px;overflow:hidden;
  background-color:#111;background-position:center;background-size:cover;background-repeat:no-repeat}
.hero-overlay{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.22) 55%,transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:22px 24px}
.hero-brand{font-size:10px;color:rgba(200,169,110,.72);letter-spacing:.25em;margin-bottom:10px}
.hero-name{font-family:Georgia,serif;font-size:28px;color:#f9f6f0;font-weight:300;line-height:1.2;margin-bottom:6px}
.hero-identity{font-size:13px;color:rgba(249,246,240,.52);font-style:italic;line-height:1.6;margin-bottom:6px}
.hero-date{font-size:11px;color:rgba(200,169,110,.55);letter-spacing:.04em}

/* ── Poem section ── */
.poem-sec{background:#f5f2eb;padding:44px 24px 38px}
.sec-label{font-size:10px;color:#27500A;letter-spacing:.22em;margin-bottom:18px;font-weight:500}
.genre-badge{display:inline-block;padding:3px 12px;border-radius:20px;background:#e8f3e0;
  color:#27500A;font-size:11px;letter-spacing:.06em;font-weight:600;margin-bottom:22px}
.poem-body{padding:0 2px}
.poem-line{font-family:Georgia,serif;font-size:19px;color:#2d2a22;line-height:2.3;letter-spacing:.01em}

/* ── Shot sections ── */
.shot-sec{border-top:1px solid #f0ece3}
.shot-img{width:100%;display:block;height:auto}
.shot-body{padding:22px 24px 32px}
.shot-num{font-size:10px;color:#9e8250;letter-spacing:.18em;margin-bottom:10px;font-weight:500}
.shot-caption{font-size:14px;color:#6b6050;line-height:1.8;margin-bottom:16px;font-style:italic}
.shot-poem{border-left:3px solid #27500A;padding:10px 14px;font-size:13px;color:#2d2a22;
  line-height:1.9;font-style:italic;background:#f5f2eb;border-radius:0 4px 4px 0}

/* ── Last message ── */
.last-msg-sec{padding:28px 24px;border-top:1px solid #f0ece3;
  border-left:4px solid #c8a96e;background:#faf7f2}
.last-msg-to{font-size:10px;color:#9e8250;letter-spacing:.1em;margin-bottom:10px}
.last-msg-text{font-size:17px;color:#2d2a22;font-style:italic;line-height:1.9}

/* ── Share ── */
.share-sec{background:#faf7f2;padding:28px 24px 24px;border-top:1px solid #e5dece;text-align:center}
.share-lbl{font-size:10px;color:#9e8250;letter-spacing:.12em;margin-bottom:8px}
.share-url{font-size:11px;color:#6b6050;margin-bottom:16px;word-break:break-all}
.share-btns{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn-kakao{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#FEE500;
  border:none;border-radius:20px;font-size:13px;color:#3C1E1E;cursor:pointer;font-family:inherit;font-weight:600}
.btn-copy{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#fff;
  border:1px solid #c8a96e;border-radius:20px;font-size:13px;color:#9e8250;cursor:pointer;font-family:inherit}
.play-btn{padding:10px 18px;background:#27500A;border:none;border-radius:20px;font-size:13px;
  color:#EAF3DE;cursor:pointer;font-family:inherit;letter-spacing:.03em;transition:opacity .15s}
.play-btn:disabled{opacity:.5;cursor:default}
.share-tagline{font-size:12px;color:#c8a96e;line-height:1.8}

/* ── CTA ── */
.cta-sec{background:#27500A;padding:40px 24px;text-align:center}
.cta-sub{font-size:11px;color:rgba(234,243,222,.6);letter-spacing:.18em;margin-bottom:10px}
.cta-title{font-size:20px;color:#EAF3DE;font-weight:600;margin-bottom:8px;line-height:1.5}
.cta-desc{font-size:13px;color:rgba(234,243,222,.72);margin-bottom:22px;line-height:1.7}
.cta-btn{display:inline-block;padding:13px 34px;background:#EAF3DE;border-radius:4px;
  font-size:14px;font-weight:700;color:#27500A;text-decoration:none;letter-spacing:.06em}

/* ── Footer ── */
.footer{padding:22px 24px;background:#f9f6f0;text-align:center;border-top:1px solid #e5dece}
.footer a{color:#9e8250;text-decoration:none;font-size:12px}

/* ── Slideshow overlay (same as today-result.html) ── */
#slideshow-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:#0a0a0a;flex-direction:column;align-items:stretch}
#ss-stage{position:relative;flex:1;background:#000;overflow:hidden;
  display:flex;align-items:center;justify-content:center;min-height:0}
.ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s ease}
#ss-caption{position:absolute;bottom:0;left:0;right:0;padding:48px 24px 22px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;font-size:14px;
  line-height:1.75;text-align:center;opacity:0;transition:opacity .5s ease;pointer-events:none}
#ss-text-screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;padding:48px 36px;text-align:center;background:#0a0a0a;opacity:0;transition:opacity .8s ease}
#ss-footer{display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:14px 0 22px;background:#0a0a0a;flex-shrink:0}
#slideshow-dots{display:flex;gap:6px;align-items:center;min-height:8px}
#slideshow-stop-btn{padding:8px 28px;background:transparent;border:1px solid rgba(200,169,110,.5);
  border-radius:20px;color:rgba(200,169,110,.8);font-size:13px;cursor:pointer;font-family:inherit}

@media(max-width:600px){
  .hero{height:60vw}
  .poem-sec{padding:36px 20px 30px}
  .shot-body{padding:18px 20px 28px}
  .last-msg-sec{padding:22px 20px}
  .share-sec,.cta-sec{padding:24px 20px}
}
</style>
</head>
<body>

<!-- Fixed language tabs -->
<div id="lang-bar">
  <button class="ltab active" onclick="selectLang('ko',this)">KO</button>
  <button class="ltab" onclick="selectLang('en',this)">EN</button>
  <button class="ltab" onclick="selectLang('ja',this)">JP</button>
  <button class="ltab" onclick="selectLang('zh',this)">ZH</button>
</div>

<!-- Slideshow overlay -->
<div id="slideshow-overlay">
  <div id="ss-stage">
    <img id="ss-img-a" class="ss-img" alt="">
    <img id="ss-img-b" class="ss-img" alt="">
    <div id="ss-caption"></div>
    <div id="ss-text-screen"></div>
  </div>
  <div id="ss-footer">
    <div id="slideshow-dots"></div>
    <button id="slideshow-stop-btn" onclick="window.stopSlideshow()">&#9646; 정지</button>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div style="display:flex;gap:6px">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <div style="font-size:11px;color:rgba(200,169,110,.5);letter-spacing:.12em;margin-top:4px">미스토리 · MESTORY</div>
</div>

<!-- Error -->
<div id="error-box" style="display:none">
  <div style="font-size:17px;color:#6b6050">페이지를 찾을 수 없습니다.</div>
  <a href="https://mestory.art" style="font-size:13px;color:#27500A;text-decoration:none">← 미스토리로</a>
</div>

<div id="main" style="display:none"></div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<script>
(function(){
  var SERVER  = 'https://humandocu-server-production.up.railway.app';
  var params  = new URLSearchParams(location.search);
  var docId   = params.get('id');
  var pageUrl = 'https://mestory.art/today-result-v2.html?id=' + (docId ? encodeURIComponent(docId) : '');

  // ── 슬라이드쇼 상태 ──
  var _ttsLang     = 'ko';
  var _slideTimer  = null;
  var _isPlaying   = false;
  var _currentData = null;
  var _bgmAudio    = null;
  var _ssActiveImg = 'a';
  var _captionTimer= null;
  var BGM_URL = 'https://kiki4i.github.io/humandocu/bugo/BGM.mp3';

  function _getPoem(data, lang) {
    var map = {
      ko: data.today_poem || '',
      en: data.today_poem_en || data.today_poem || '',
      ja: data.today_poem_ja || data.today_poem || '',
      zh: data.today_poem_zh || data.today_poem || '',
    };
    return map[lang] || data.today_poem || '';
  }

  function _formatDate(dateStr, lang) {
    if (!dateStr) return '';
    var m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return '';
    var y = parseInt(m[1], 10), mo = parseInt(m[2], 10), d = parseInt(m[3], 10);
    if (lang === 'ko') return y + '년 ' + mo + '월 ' + d + '일';
    if (lang === 'en') {
      var months = ['January','February','March','April','May','June','July','August',
                    'September','October','November','December'];
      return months[mo-1] + ' ' + d + ', ' + y;
    }
    if (lang === 'ja') return y + '年' + mo + '月' + d + '日';
    if (lang === 'zh') return y + '年' + mo + '月' + d + '日';
    return '';
  }

  function _getImages(data) {
    var imgs = [];
    (data.shots || []).forEach(function(s){ if(s.image) imgs.push(s.image); });
    return imgs;
  }

  function _updateDots(total, cur) {
    var el = document.getElementById('slideshow-dots');
    if (!el) return;
    var h = '';
    for (var i = 0; i < total; i++) {
      h += '<span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:'
        + (i === cur ? '#c8a96e' : 'rgba(200,169,110,0.3)') + '"></span>';
    }
    el.innerHTML = h;
  }

  function _stopSlideshow() {
    _isPlaying = false;
    if (_slideTimer)  { clearTimeout(_slideTimer);   _slideTimer   = null; }
    if (_captionTimer){ clearTimeout(_captionTimer);  _captionTimer = null; }
    if (_bgmAudio)    { _bgmAudio.pause(); _bgmAudio.currentTime = 0; _bgmAudio = null; }
    var ov  = document.getElementById('slideshow-overlay');
    if (ov) ov.style.display = 'none';
    var btn = document.getElementById('play-btn');
    if (btn){ btn.textContent = '▶ 슬라이드쇼 재생'; btn.disabled = false; }
  }
  window.stopSlideshow = _stopSlideshow;

  function _ssCrossfadeTo(url, captionText) {
    var next   = _ssActiveImg === 'a' ? 'b' : 'a';
    var nextEl = document.getElementById('ss-img-' + next);
    var prevEl = document.getElementById('ss-img-' + _ssActiveImg);
    var cap    = document.getElementById('ss-caption');
    var ts     = document.getElementById('ss-text-screen');
    if (cap) cap.style.opacity = '0';
    if (_captionTimer){ clearTimeout(_captionTimer); _captionTimer = null; }
    if (ts && ts.style.display !== 'none') {
      ts.style.opacity = '0';
      setTimeout(function(){ ts.style.display = 'none'; }, 820);
    }
    var preload = new Image();
    preload.onload = preload.onerror = function() {
      nextEl.src = url;
      nextEl.getBoundingClientRect();
      nextEl.style.opacity = '1';
      prevEl.style.opacity = '0';
      _ssActiveImg = next;
      if (cap && captionText) {
        _captionTimer = setTimeout(function(){
          cap.textContent = captionText;
          cap.style.opacity = '1';
        }, 500);
      }
    };
    preload.src = url;
  }

  function _ssShowText(innerHtml) {
    var ts  = document.getElementById('ss-text-screen');
    var a   = document.getElementById('ss-img-a');
    var b   = document.getElementById('ss-img-b');
    var cap = document.getElementById('ss-caption');
    if (a) a.style.opacity = '0';
    if (b) b.style.opacity = '0';
    if (cap){ cap.style.opacity = '0'; cap.textContent = ''; }
    _ssActiveImg = 'a';
    ts.innerHTML = innerHtml;
    ts.style.opacity = '0';
    ts.style.display = 'flex';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ ts.style.opacity = '1'; });
    });
  }

  function _startSlideshow(imgs) {
    _isPlaying = true;
    var ts = document.getElementById('ss-text-screen');
    if (ts){ ts.style.opacity = '0'; ts.style.display = 'none'; ts.innerHTML = ''; }
    var a = document.getElementById('ss-img-a'), b = document.getElementById('ss-img-b');
    if (a){ a.style.opacity = '0'; a.src = ''; }
    if (b){ b.style.opacity = '0'; b.src = ''; }
    _ssActiveImg = 'a';

    var btn = document.getElementById('play-btn');
    if (btn){ btn.textContent = '&#9646; 정지'; btn.disabled = false; }

    var ov = document.getElementById('slideshow-overlay');
    if (ov) ov.style.display = 'flex';

    var captions = imgs.map(function(url){
      var shots = (_currentData && _currentData.shots) || [];
      for (var j = 0; j < shots.length; j++){
        if (shots[j].image === url) return shots[j].text || '';
      }
      return '';
    });

    if (_bgmAudio){ try{ _bgmAudio.pause(); }catch(e){} }
    _bgmAudio = new Audio(BGM_URL);
    _bgmAudio.loop   = true;
    _bgmAudio.volume = 0.25;
    _bgmAudio.play().catch(function(){});

    var nick = (_currentData && _currentData.nickname) || '';
    var date = _currentData ? _formatDate(_currentData.created_at, _ttsLang) : '';
    var introLabel = {ko:'오늘을 담은 시',en:'A Poem for Today',ja:'今日を詠んだ詩',zh:'今日之诗'}[_ttsLang] || '오늘을 담은 시';

    function _introHtml() {
      return '<div style="color:rgba(200,169,110,.65);font-size:10px;letter-spacing:.3em;margin-bottom:22px">MESTORY</div>'
        + (nick ? '<div style="font-family:Georgia,serif;font-size:30px;color:#f9f6f0;font-weight:300;margin-bottom:10px">' + esc(nick) + '</div>' : '')
        + (date ? '<div style="font-size:13px;color:rgba(249,246,240,.4);margin-bottom:26px">' + esc(date) + '</div>' : '')
        + '<div style="font-size:15px;color:rgba(200,169,110,.85);letter-spacing:.08em">' + introLabel + '</div>';
    }

    _ssShowText(_introHtml());
    _updateDots(imgs.length, 0);

    _slideTimer = setTimeout(function(){
      function showPhoto(idx){
        if (!_isPlaying) return;
        if (idx < imgs.length){
          _ssCrossfadeTo(imgs[idx], captions[idx]);
          _updateDots(imgs.length, idx);
          _slideTimer = setTimeout(function(){ showPhoto(idx + 1); }, 4000);
        } else {
          var pLines = _getPoem(_currentData, _ttsLang).trim().split('\n').filter(function(l){ return l.trim(); });
          _ssShowText(
            '<div style="max-width:340px">'
            + pLines.map(function(l){
                return '<div style="font-family:Georgia,serif;font-size:18px;color:#f9f6f0;line-height:2.1;letter-spacing:.02em">' + esc(l) + '</div>';
              }).join('')
            + '</div>'
          );
          _slideTimer = setTimeout(function(){
            if (!_isPlaying) return;
            _ssShowText(_introHtml());
            _updateDots(imgs.length, 0);
            _slideTimer = setTimeout(function(){ showPhoto(0); }, 1500);
          }, 5000);
        }
      }
      showPhoto(0);
    }, 1500);
  }

  window.selectLang = function(lang, el) {
    _ttsLang = lang;
    document.querySelectorAll('.ltab').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    var pd = document.getElementById('poem-display');
    if (pd && _currentData) pd.innerHTML = poemBodyHtml(_getPoem(_currentData, lang));
  };

  window.togglePlay = function() {
    if (_isPlaying){ _stopSlideshow(); return; }
    if (!_currentData) return;
    var imgs = _getImages(_currentData);
    if (!imgs.length){ alert('슬라이드쇼용 사진이 없습니다.'); return; }
    _startSlideshow(imgs);
  };

  // ── Init ──
  if (!docId){ showError(); return; }

  fetch(SERVER + '/api/today/data/' + encodeURIComponent(docId))
    .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data){ render(data); })
    .catch(function(){ showError(); });

  function showError(){
    document.getElementById('loading').style.display = 'none';
    var eb = document.getElementById('error-box');
    eb.style.display = 'flex';
  }

  function esc(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function poemBodyHtml(text){
    if (!text) return '';
    return text.trim().split('\n').filter(function(l){ return l.trim(); }).map(function(l){
      return '<div class="poem-line">' + esc(l) + '</div>';
    }).join('');
  }

  function render(data){
    _currentData = data;
    document.title = '미스토리 · ' + esc(data.nickname || '');

    var hasImgs  = (data.shots||[]).some(function(s){ return !!s.image; });
    var firstImg = '';
    if (data.shots){
      for (var i = 0; i < data.shots.length; i++){
        if (data.shots[i].image){ firstImg = data.shots[i].image; break; }
      }
    }

    var shareDesc = data.identity || '';
    if (!shareDesc && data.today_poem){
      var pl = data.today_poem.split('\n').filter(function(l){ return l.trim(); });
      if (pl.length) shareDesc = pl[0];
    }
    if (!shareDesc && data.shots && data.shots.length) shareDesc = data.shots[0].text || '';
    if (!shareDesc) shareDesc = '사진과 짧은 글 한 줄. AI가 오늘을 기억할 글로 담아드립니다.';
    window._share = { img: firstImg||'https://mestory.art/today-icon-512.png', desc: shareDesc, url: pageUrl };

    var html = '';

    // 1. Hero
    html += '<div class="hero"'
      + (firstImg ? ' style="background-image:url(\'' + esc(firstImg) + '\')"' : '') + '>'
      + '<div class="hero-overlay"></div>'
      + '<div class="hero-content">'
      + '<div class="hero-brand">미스토리 · MESTORY</div>'
      + '<div class="hero-name">' + esc(data.nickname || '') + '</div>'
      + (data.identity ? '<div class="hero-identity">' + esc(data.identity) + '</div>' : '')
      + (data.created_at ? '<div class="hero-date">' + esc(data.created_at) + '</div>' : '')
      + '</div></div>';

    // 2. Poem
    if (data.today_poem){
      html += '<div class="poem-sec">'
        + '<div class="sec-label">✦ 오늘을 담은 시</div>'
        + (data.genre ? '<div class="genre-badge">' + esc(data.genre) + '</div>' : '')
        + '<div class="poem-body" id="poem-display">' + poemBodyHtml(data.today_poem) + '</div>'
        + '</div>';
    }

    // 3. Shots
    (data.shots || []).forEach(function(s){
      html += '<div class="shot-sec">';
      if (s.image) html += '<img src="' + esc(s.image) + '" class="shot-img" loading="lazy" alt="SHOT ' + s.index + '">';
      html += '<div class="shot-body">';
      html += '<div class="shot-num">SHOT ' + String(s.index).padStart(2,'0') + '</div>';
      if (s.text) html += '<div class="shot-caption">' + esc(s.text) + '</div>';
      if (s.poem){
        var pLines = s.poem.trim().split('\n').filter(function(l){ return l.trim(); })
                      .map(function(l){ return esc(l); }).join('<br>');
        html += '<div class="shot-poem">' + pLines + '</div>';
      }
      html += '</div></div>';
    });

    // 4. Last message
    if (data.last_msg){
      var toLabel = data.last_to ? 'To. ' + data.last_to : '누군가에게 남기는 한 줄';
      html += '<div class="last-msg-sec">'
        + '<div class="last-msg-to">' + esc(toLabel) + '</div>'
        + '<div class="last-msg-text">' + esc(data.last_msg) + '</div>'
        + '</div>';
    }

    // 5. Share
    html += '<div class="share-sec">'
      + '<div class="share-lbl">나의 미스토리 링크</div>'
      + '<div class="share-url">' + pageUrl + '</div>'
      + '<div class="share-btns">'
      + '<button class="btn-kakao" onclick="doKakao()">'
      + '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="8" rx="8" ry="6.5" fill="#3C1E1E"/><path d="M5.5 10.5c.3.7 1 1.2 2 1.5l-.5 2 2-1.5c.3 0 .7.1 1 .1 3.3 0 6-2 6-4.5S12.3 3.5 9 3.5 3 5.5 3 8c0 1 .6 2 1.5 2.5z" fill="#FEE500"/></svg>'
      + 'KakaoTalk</button>'
      + '<button class="btn-copy" onclick="doCopy()">&#128279; 링크 복사</button>'
      + (hasImgs && data.today_poem ? '<button id="play-btn" class="play-btn" onclick="togglePlay()">&#9654; 슬라이드쇼 재생</button>' : '')
      + '</div>'
      + '<div class="share-tagline">매일을 담아보세요.<br>모으면 그것이 당신이에요.</div>'
      + '</div>';

    // 6. CTA
    html += '<div class="cta-sec">'
      + '<div class="cta-sub">MESTORY</div>'
      + '<div class="cta-title">오늘 당신의 하루도<br>이야기가 될 수 있어요</div>'
      + '<div class="cta-desc">사진과 짧은 글 한 줄 · 무료 · AI가 기억할 글로 담아드립니다</div>'
      + '<a href="https://mestory.art" class="cta-btn">나도 기록하기 →</a>'
      + '</div>';

    // 7. Footer
    html += '<div class="footer"><a href="https://mestory.art">mestory.art</a></div>';

    document.getElementById('main').innerHTML = html;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    if (window.Kakao && !Kakao.isInitialized()){
      Kakao.init('5b7821698a09c74f1d72c0b52165d557');
    }
  }

  window.doKakao = function(){
    if (!window.Kakao || !Kakao.isInitialized()){ doCopy(); return; }
    var s = window._share || {};
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: '미스토리 — 나의 오늘, 나의 이야기',
        description: s.desc || '',
        imageUrl: s.img || 'https://mestory.art/today-icon-512.png',
        link: { mobileWebUrl: s.url, webUrl: s.url },
      },
      buttons: [
        { title: '이 기록 보기', link: { mobileWebUrl: s.url, webUrl: s.url } },
        { title: '나도 기록하기', link: { mobileWebUrl: 'https://mestory.art', webUrl: 'https://mestory.art' } },
      ],
    });
  };

  window.doCopy = function(){
    var url = pageUrl;
    if (navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){ alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요'); });
    } else {
      var el = document.createElement('textarea'); el.value = url;
      document.body.appendChild(el); el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      alert('링크가 복사됐어요!\n카톡·인스타·명함에 붙여 담으세요');
    }
  };
})();
</script>
</body>
</html>
